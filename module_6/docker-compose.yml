services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: gradcafe
      POSTGRES_USER: gradcafe
      POSTGRES_PASSWORD: gradcafe
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradcafe"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./src/web
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://gradcafe:gradcafe@db:5432/gradcafe
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: ./src/worker
    environment:
      DATABASE_URL: postgresql://gradcafe:gradcafe@db:5432/gradcafe
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    volumes:
      - ./src/data:/data:ro
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
