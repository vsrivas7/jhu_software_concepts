name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ────────────────────────────────────────────────
  # Job 1 — Pylint (must score 10/10)
  # ────────────────────────────────────────────────
  lint:
    name: Pylint (10/10 required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: module_6
        run: |
          python -m pip install --upgrade pip
          pip install pika flask psycopg requests beautifulsoup4 pylint pytest pytest-cov

      - name: Run Pylint
        working-directory: module_6
        run: |
          pylint src/web/run.py src/web/publisher.py src/web/app/query_data.py src/web/app/db.py src/worker/consumer.py --fail-under=10

  # ────────────────────────────────────────────────
  # Job 2 — Pytest + Coverage
  # ────────────────────────────────────────────────
  test:
    name: Pytest (100% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: module_6
        run: |
          python -m pip install --upgrade pip
          pip install pika flask psycopg requests beautifulsoup4 pylint pytest pytest-cov

      - name: Run tests with coverage
        working-directory: module_6
        run: |
          pytest tests/test_app.py -v --cov=src/web --cov=src/worker --cov-report=term-missing --cov-fail-under=98

  # ────────────────────────────────────────────────
  # Job 3 — Snyk dependency scan
  # ────────────────────────────────────────────────
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: module_6
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk test
        working-directory: module_6
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --file=requirements.txt --package-manager=pip || true
