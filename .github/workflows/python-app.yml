name: Python CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r module_5/requirements.txt
          pip install pylint snyk

      - name: Install project
        run: |
          cd module_5
          pip install .

      - name: Run pylint
        run: |
          pylint module_5/src --fail-under=10

      - name: Run tests
        run: |
          pytest module_5

      - name: Run Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --file=module_5/requirements.txt
